# Storymaker — collaborative storytelling engine for Kind Robots (Phase 3)
# Progress % = done weight (+ half for in-progress) / total weight.

project: storymaker
kind: software

notes_from_silas: |
  Full collaborative storytelling engine built on top of existing Kind Robots
  data models (Bots, Characters, Dreams, Rewards, Scenarios, Chats).
  Two modes: Exquisite Corpse (async turn-based) and Guided Adventure
  (LLM narrator, branching choices, inventory, solo or group).
  House style: Nuxt 4 / Vue 3 / TypeScript / Prisma / Pinia 3 / DaisyUI.
  Treat shared backend as read-only/external. App-owned logic only here.
  Backend changes become pitches, not direct edits.

