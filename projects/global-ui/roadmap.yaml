project: global-ui
kind: software
notes_from_silas: "Create the shared Kind Robots interface system for presenting projects, tasks,\nhoneydos,\
  \ kaizens, approvals, and front-end TODO prompts.\n\nA honeydo is a task the LLM assigns to the user\
  \ to help projects along. Honeydos\nare not project-specific for viewing; they should surface in a global\
  \ user-facing\nqueue or inbox.\n\nA kaizen is shown while viewing an individual project. It gives the\
  \ user a prompt\nto move that specific project forward.\n\nFront-end task creation should register visibly\
  \ in the workspace UI and connect\ncleanly to the conductor/todo flow without inventing a second source\
  \ of truth.\nPrefer app-owned UI/store/API logic that consumes existing backend and conductor\nfiles\
  \ safely.\n\nImplementation seed: the project view should include a specific field/prompt that\nasks,\
  \ \"How can I make this look better?\" This should invite user-facing polish ideas\nfor the currently\
  \ viewed project and can feed the kaizen/task creation flow.\n\nDesired features should be an orderable\
  \ list on each dream/project. Humans and AI\nshould both be able to add, adjust, reorder, promote, or\
  \ retire desired features\nwithout rewriting the whole project spec or roadmap. Treat it as a lightweight\n\
  feature wishlist/backlog that can later graduate into concrete tasks.\n\nKind Robots audit note: current\
  \ frontend/backend support is partial. Todo already\nsupports AGENT, KAIZEN, and HONEYDO categories\
  \ globally, but Todos are not scoped to\na dream/project and desired features are not modeled as an\
  \ orderable project list yet.\n\nPromote a recurring site-audit agent that does the same kind of check:\
  \ compare the\nroadmap/conductor vocabulary against the actual Kind Robots frontend/backend, identify\n\
  support gaps, and propose small reversible tasks. Weekly is a reasonable starting\ninterval; slow it\
  \ down once the surfaces are stable.\n\nGate note (2026-06-30): t-001 gate removed. Silas pre-approves\
  \ the spec direction \u2014\nwrite the task surface spec and merge without another approval round. Downstream\n\
  tasks unblock automatically when t-001 reaches done.\n"
