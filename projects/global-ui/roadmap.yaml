# Global UI — Front-End Task Orchestration
# software-kind. Defines how Kind Robots presents projects, tasks, honeydos,
# kaizens, approvals, and front-end TODO prompts across the workspace.
# Progress % = done weight (+ half for in-progress) / total weight.

project: global-ui
kind: software

notes_from_silas: |
  Create the shared Kind Robots interface system for presenting projects, tasks,
  honeydos, kaizens, approvals, and front-end TODO prompts.

  A honeydo is a task the LLM assigns to the user to help projects along. Honeydos
  are not project-specific for viewing; they should surface in a global user-facing
  queue or inbox.

  A kaizen is shown while viewing an individual project. It gives the user a prompt
  to move that specific project forward.

  Front-end task creation should register visibly in the workspace UI and connect
  cleanly to the conductor/todo flow without inventing a second source of truth.
  Prefer app-owned UI/store/API logic that consumes existing backend and conductor
  files safely.

milestones:
  - id: m1
    title: "Task language + presentation model"
    weight: 20
    status: not-started

  - id: m2
    title: "Front-end task creation registers in the workspace"
    weight: 30
    status: not-started

  - id: m3
    title: "Global honeydo inbox"
    weight: 20
    status: not-started

  - id: m4
    title: "Project-specific kaizen prompts"
    weight: 20
    status: not-started

  - id: m5
    title: "Unified project/task navigation design"
    weight: 10
    status: not-started

tasks:
  - id: t-001
    milestone: m1
    title: "Spec task surfaces for projects, honeydos, kaizens, and TODOs"
    status: ready
    owner: null
    passes: 0
    stakes: reversible
    gate_human: true
    approved_by_human: false
    note: >
      Draft a concise product/interface spec that defines the user-facing task
      taxonomy and presentation rules: normal project tasks, front-end TODOs,
      honeydos, kaizens, approvals, and archived/completed states. Include where
      each appears, what actions the user can take, how it registers on the front
      end, and what remains the source of truth. End needs-human so Silas can
      approve the language before implementation.

  - id: t-002
    milestone: m2
    title: "Build the task creation flow that registers on the front end"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Implement the app-owned flow for creating a task from the front end and
      showing it immediately in the workspace UI. Use the approved spec from
      t-001. Route data through Pinia/store-owned interactions rather than calling
      API routes directly from components. Preserve the conductor source-of-truth
      boundary.

  - id: t-003
    milestone: m3
    title: "Design and wire the global honeydo inbox"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Create the global user-facing surface for honeydos: LLM-assigned tasks for
      the user that help projects along but are not viewed as project-specific.
      Define empty states, completion behavior, priority display, and how honeydos
      relate to existing Todos.

  - id: t-004
    milestone: m4
    title: "Design and wire project-specific kaizen prompts"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Create the project-detail kaizen surface: a contextual prompt that helps the
      user move the currently viewed project forward. It should feel lightweight,
      actionable, and clearly tied to the selected project without polluting the
      global honeydo queue.

  - id: t-005
    milestone: m5
    title: "Map the unified global UI for project and task presentation"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on:
      - t-002
      - t-003
      - t-004
    note: >
      Produce the final navigation/presentation map for projects, roadmaps, Todos,
      honeydos, kaizens, approvals, and completion history. Identify any follow-up
      tasks as separate scoped work rather than expanding this task.
