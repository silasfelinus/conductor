# art-generate.yaml — Active image-generation batch
#
# Send this file to ChatGPT along with the system prompt from ART-PROMPTS.md.
# Generate exactly one standalone image per entry. No collages, grids, or contact sheets.
# After generating: save each file to its target_repo at the listed image_path, then remove
# its entry from this file. Pull the next batch (up to 10 entries) from pending entries in
# projects/art-prompts.yaml (images: and inspirations: sections).

batch:
  entries:
    - image_path: projects/images/media-watchlist-icon.webp
      target_repo: silasfelinus/conductor
      size: "256x256"
      prompt: >
        Premium app icon for Media Watchlist, a stack of beloved media objects fused into one
        clean symbol: book, film reel, game controller, comic card, and checklist marks, glossy
        dimensional app-icon rendering, deep navy backdrop with subtle glow, elegant readable
        silhouette, no text, no logo, no watermark, no collage, square composition

    - image_path: public/images/artcollections/sketchy/sketchy-inspiration-01.webp
      target_repo: silasfelinus/kind_robots
      size: "1280x720"
      prompt: >
        A luminous sketch-practice room where simple shapes become confident character drawings
        on floating transparent layers, an encouraging tiny robot art coach gesturing toward
        the next exercise, premium cozy creative-tool concept art, no text, no collage

    - image_path: public/images/artcollections/sketchy/sketchy-inspiration-02.webp
      target_repo: silasfelinus/kind_robots
      size: "1280x720"
      prompt: >
        Close-up of a tactile sketchbook page with graphite studies, eraser crumbs, gesture
        thumbnails, and one charming character breaking out of the page into the real desk
        light, crisp professional illustration, no text, no collage

    - image_path: public/images/artcollections/sketchy/sketchy-inspiration-03.webp
      target_repo: silasfelinus/kind_robots
      size: "1280x720"
      prompt: >
        A friendly critique interface imagined as physical art objects: pinned sketches, color
        chips, tiny spark badges, and a pencil companion guiding improvement without judgment,
        polished product key art, no text, no collage

    - image_path: public/images/artcollections/art-generator-connect/art-generator-connect-inspiration-01.webp
      target_repo: silasfelinus/kind_robots
      size: "1280x720"
      prompt: >
        A conductor-like robot routing prompt cards through glowing image machines into neatly
        labeled visual asset folders, cinematic creative pipeline energy without readable UI
        text, professional sci-fi product art, no collage

    - image_path: public/images/artcollections/art-generator-connect/art-generator-connect-inspiration-02.webp
      target_repo: silasfelinus/kind_robots
      size: "1280x720"
      prompt: >
        Macro view of generated thumbnails crystallizing from light inside transparent tubes,
