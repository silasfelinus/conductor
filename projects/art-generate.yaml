        illustration, no text, no collage

    - image_path: public/images/artcollections/storymaker/storymaker-inspiration-01.webp
      target_repo: silasfelinus/kind_robots
      size: "1280x720"
      prompt: >
        A tabletop map blooming into multiple possible scenes at once: forest, airship, castle,
        sea cave, and dragon trail, with players shaping the story through glowing choice
        tokens, high-end cozy fantasy game art, no text, no collage

    - image_path: public/images/artcollections/storymaker/storymaker-inspiration-02.webp
      target_repo: silasfelinus/kind_robots
      size: "1280x720"
      prompt: >
        A robot narrator opening a starry book while diverse adventurers step from the pages
        into a shared world, expressive character design and cinematic depth, no text, no
