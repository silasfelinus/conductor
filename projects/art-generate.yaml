    - image_path: public/images/artcollections/art-generator-connect/art-generator-connect-inspiration-03.webp
      target_repo: silasfelinus/kind_robots
      size: "1280x720"
      prompt: >
        A calm operations desk where failed placeholders are transformed into finished art
