tasks:
  - id: t-001
    milestone: m1
    title: "Define the pinball machine architecture and constraints"
    status: ready
    owner: null
    passes: 0
    stakes: reversible
    updated: 2026-06-29
    gate_human: true
    note: >
      Produce a first design brief for a compact, durable, partly 3D-printed pinball machine.
      Define the target cabinet/playfield size, mechanical scope, what should be printed vs
      purchased, Bambu A1 print constraints, safety constraints, and the likely build variants.
      Include assumptions and open questions for Silas before downstream BOM/model work begins.

  - id: t-002
    milestone: m2
    title: "Research BOM tiers and common-source parts"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    updated: 2026-06-29
    depends_on: t-001
    note: >
      Create starter, solid, and deluxe bill-of-materials tiers. Favor reliable common parts:
      plywood or MDF cabinet material, acrylic/polycarbonate, commodity switches/sensors,
      buttons, wiring, fasteners, power supplies, coils/solenoids where appropriate, microcontroller
      options, LED options, and printed hardware. Call out where used/salvaged pinball parts are
      better than printing.

  - id: t-003
    milestone: m3
    title: "Specify the 3D printable model set"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    updated: 2026-06-29
    depends_on: t-001
    note: >
      Define the printable model catalog: brackets, guides, wireforms substitutes, lane plastics,
      posts, target housings, ball trough helpers, ramps if feasible, playfield fixtures, cable clips,
      and cabinet helpers. Include recommended materials, orientations, tolerances, heat/wear notes,
      and whether each part should be STL, 3MF, or editable CAD source.

  - id: t-004
    milestone: m4
    title: "Design the electronics and control plan"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    updated: 2026-06-29
    depends_on:
      - t-001
      - t-002
    note: >
      Draft the control architecture for lights, sensors, buttons, audio, scoring, and solenoid-safe
      actuation if included. Compare microcontroller and SBC options, identify safe power domains,
      fuse/protection needs, and document what should remain low-voltage beginner-friendly.

  - id: t-005
    milestone: m5
    title: "Assemble the first build-plan package outline"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    updated: 2026-06-29
    depends_on:
      - t-002
      - t-003
      - t-004
    note: >
      Produce the outline for the final deliverable: parts list by tier, printable files index,
      assembly order, calibration/testing steps, safety checklist, maintenance notes, and upgrade
      paths. This is still a draft package and should stay needs-human before publishing.

  - id: t-006
    milestone: m4
    title: "Survey open-source pinball software stacks for project fit"
    status: ready
    owner: null
    updated: "2026-06-30T00:00:00Z"
    passes: 0
    stakes: reversible
    note: >
      Runs parallel to t-001 — no dependency on the architecture brief approval.
      Research available open-source pinball control software (Mission Pinball
      Framework, PyPinball, FAST Pinball, Multimorphic, etc.) and evaluate each
      for: beginner friendliness, Raspberry Pi / Arduino / ESP32 support, community
      activity, and license. Write projects/pinball-hero/SOFTWARE-SURVEY.md with a
      comparison table and a recommended starting point for Silas to consider when
      approving the architecture brief. No purchasing or hardware commitments.
