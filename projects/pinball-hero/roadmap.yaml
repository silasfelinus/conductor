  - id: t-006
    milestone: m4
    title: "Survey open-source pinball software stacks for project fit"
    status: done
    owner: worker
    updated: "2026-06-30T00:00:00Z"
    passes: 0
    stakes: reversible
    note: >
      Wrote projects/pinball-hero/SOFTWARE-SURVEY.md. Compared Mission Pinball Framework
      (MPF), FAST Pinball software, Multimorphic P-ROC, pypinball, Visual Pinball X, and
      MiSTer FPGA pinball cores. Recommendation: MPF + Open Pinball Project (OPP) hardware.
      MPF is the only free, hardware-agnostic, actively maintained option with a large
      community and YAML-config-based machine definition. OPP boards are open-source and
      cost-effective. First step for Silas: install MPF virtual simulator for zero-cost
      development testing before hardware commitment.
