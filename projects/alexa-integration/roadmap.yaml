# Alexa Integration
project: alexa-integration
kind: software

notes_from_silas: |
  Define a safe voice-command interface for Conductor. The first work should be
  design-only: command list, user flows, project status readouts, todo creation,
  art request handoff, and review gates before any live service work.

milestones:
  - id: m1
    title: "Command design"
    weight: 35
    status: not-started
  - id: m2
    title: "Relay design"
    weight: 30
    status: not-started
  - id: m3
    title: "Review and rollout plan"
    weight: 35
    status: not-started

tasks:
  - id: t-001
    milestone: m1
    title: "Draft voice command list"
    status: ready
    owner: null
    passes: 0
    stakes: reversible
    gate_human: true
    note: >
      Draft the first command list and sample phrases for creating todos, checking
      project status, reviewing approvals, requesting art, and getting an agent
      activity summary. Leave the result for Silas to approve before build work.

  - id: t-002
    milestone: m2
    title: "Draft relay design note"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Design a small relay layer that maps approved voice commands to existing
      Conductor and kind_robots actions. Keep it as a document-only plan first.

  - id: t-003
    milestone: m3
    title: "Write rollout and safety checklist"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-002
    note: >
      Write a checklist for testing, disabling, logging, and reviewing the voice
      command integration before it is used for real work.

  - id: t-004
    milestone: m2
    title: "Audit kind_robots REST API endpoints for Alexa intent suitability"
    status: ready
    owner: null
    updated: "2026-06-30T00:00:00Z"
    passes: 0
    stakes: reversible
    note: >
      Runs parallel to t-001's human gate. Read the kind_robots server/api/ directory
      and list all endpoints that return information or accept commands relevant to
      voice control: project status, todos (create/list), art requests, agent activity.
      For each, note the HTTP method, required auth, and whether it fits a short
      voice-command response (under 10 words). Write docs/kr-api-for-voice.md.
      This makes the relay design (t-002) much faster once t-001 is approved.
