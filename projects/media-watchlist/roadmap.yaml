# Media Watchlist — structured personal media archive
project: media-watchlist
kind: software

notes_from_silas: |
  Parse and import Silas's long-running log of books, games, movies, TV, comics,
  and podcasts into structured data. Surface browse/filter views, stats, review
  editing, Letterboxd sync, Comic Vine enrichment, Tautulli history, and optional
  affiliate links.

milestones:
  - id: m1
    title: "Source sample and schema plan"
    weight: 30
    status: not-started

  - id: m2
    title: "Importer design"
    weight: 25
    status: not-started

  - id: m3
    title: "Browse, filter, and stats UI"
    weight: 25
    status: not-started

  - id: m4
    title: "External enrichment integrations"
    weight: 20
    status: not-started

tasks:
  - id: t-001
    milestone: m1
    title: "Request source log and propose import schema"
    status: needs-human
    owner: null
    passes: 0
    stakes: reversible
    gate_human: true
    note: >
      Silas needs to provide the raw text log before parsing can begin. Once the
      sample exists, parse the first 100 entries, identify format patterns, and
      propose a DB schema plus import script plan.

  - id: t-002
    milestone: m2
    title: "Design parser normalization rules"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Define how raw entries normalize into medium, title, creator, year, consumed
      date, rating, source, notes, and external IDs. Include ambiguous-entry handling.

  - id: t-003
    milestone: m3
    title: "Draft watchlist browse and stats UX"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Plan the first UI: browse by medium/year/rating/genre, yearly stats, genre
      breakdowns, completion tracking, and a review editor that can stay private
      until Silas approves publishing.

  - id: t-004
    milestone: m4
    title: "Scope Letterboxd, Comic Vine, and Tautulli integrations"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Document the API/data requirements for Letterboxd import/export, Comic Vine
      metadata enrichment, and Tautulli Plex watch-history backfill.
