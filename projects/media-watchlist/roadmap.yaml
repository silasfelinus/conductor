# Media Watchlist — structured personal media archive
project: media-watchlist
kind: software

notes_from_silas: |
  Parse and import Silas's long-running log of books, games, movies, TV, comics,
  and podcasts into structured data. Surface browse/filter views, stats, review
  editing, Letterboxd sync, Comic Vine enrichment, Tautulli history, and optional
  affiliate links.

milestones:
  - id: m1
    title: "Source sample and schema plan"
    weight: 30
    status: not-started

  - id: m2
    title: "Importer design"
    weight: 25
    status: not-started

  - id: m3
    title: "Browse, filter, and stats UI"
    weight: 25
    status: not-started

  - id: m4
    title: "External enrichment integrations"
    weight: 20
    status: not-started

tasks:
  - id: t-001
    milestone: m1
    title: "Parse media_list.md and propose import schema"
    status: ready
    owner: null
    passes: 0
    stakes: reversible
    note: >
      The raw log is at projects/media-watchlist/media_list.md. Format: plain text,
      organized by medium headers (MOVIES, TV, BOOKS, NOVELLAE, AUDIOBOOKS, COMICS,
      VIDEO GAMES). Each entry is "Title date" where date is m/dd (2026). Asterisks
      (*) prefix entries. Parse all entries, identify format patterns and edge cases
      (missing dates, asterisk meaning, issue numbers in comics, duration in
      audiobooks), and propose a normalized DB schema in
      projects/media-watchlist/SCHEMA-DRAFT.md. Cover fields: medium, title, creator
      (where present), consumed_date, rating, notes, external IDs. No gate needed —
      this is research and schema design only.

  - id: t-002
    milestone: m2
    title: "Design parser normalization rules"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Define how raw entries normalize into medium, title, creator, year, consumed
      date, rating, source, notes, and external IDs. Include ambiguous-entry handling.

  - id: t-003
    milestone: m3
    title: "Draft watchlist browse and stats UX"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Plan the first UI: browse by medium/year/rating/genre, yearly stats, genre
      breakdowns, completion tracking, and a review editor that can stay private
      until Silas approves publishing.

  - id: t-004
    milestone: m4
    title: "Scope Letterboxd, Comic Vine, and Tautulli integrations"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Document the API/data requirements for Letterboxd import/export, Comic Vine
      metadata enrichment, and Tautulli Plex watch-history backfill.

  - id: t-005
    milestone: m2
    title: "Cross-reference Silas's log format against Letterboxd/Goodreads export formats"
    status: waiting
    owner: null
    updated: "2026-06-30T00:00:00Z"
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      After t-001 proposes the schema, compare Silas's hand-written log format against
      Letterboxd CSV and Goodreads CSV export shapes. Identify where the formats align
      (can auto-import) vs. where they diverge (needs manual mapping or a one-time
      conversion pass). This informs the importer normalization rules in t-002.
