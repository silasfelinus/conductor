# art-prompts.yaml — Image queue for Conductor project assets and Kind Robots missing-image requests
#
# Project assets use `images:` and are pruned automatically when matching files
# exist in this repo's projects/images/ folder.
#
# Inspiration images use `inspirations:`. Each project gets 3 gallery images saved to
# kind_robots at public/images/artcollections/{slug}/{slug}-inspiration-0{n}.webp.
# Remove each entry once its file is committed to the target repo.
#
# Site-wide missing-image reports use `requests:`. Kind Robots writes those
# requests here when an admin sees a missing image. Requests should be removed
# once the image has been generated and committed to the target repo.
#
# Project image variants:
#   icon  — square 1:1 (256×256 min). Used in nav, sidebar, card headers, favicons.
#   card  — portrait 2:3 (512×768 min). Shown on the workspace project card.
#   hero  — landscape 16:9 (1280×720 min). Shown as a banner/header in project view.
#
# Prompt standard:
#   Write for modern OpenAI image generation, not legacy flat placeholders.
#   Kind Robots represents a consortium of projects aimed at multi-genre,
#   cross-dimensional experiences. When a scene includes people, characters,
#   teams, families, players, operators, or companions, represent a diverse array
#   across genders, races, ages, body sizes, body shapes, presentation styles,
#   and species. Mix humans, robots, animal-like beings, fantasy creatures, and
#   original nonhuman companions when it fits the asset.
#   Do this naturally and respectfully, without tokenism or stereotypes.
#   Icons should read instantly at small sizes: premium app-icon polish, strong silhouette.
#   Cards should feel like professional portrait key art for a polished product.
#   Heroes should feel like studio-quality game/product illustration with cinematic depth.
#   Always avoid readable text, logos, watermarks, contact sheets, and collages.
#
# Workflow:
#   1. Copy the generator prompt from ART-PROMPTS.md into ChatGPT.
#   2. Paste one batch of up to ten entries from this file.
#   3. Generate exactly one unique image per entry with the listed aspect ratio.
#   4. Export as .webp at the minimum size listed.
#   5. Save to the image_path listed below.
#   6. Run `python scripts/build_workspace.py` to refresh the workspace.
#
# Status values: pending

images:
  - project: global-ui
    icon:
      image_path: projects/images/global-ui-icon.webp
      size: "256x256"
      status: pending
      prompt: >
        Premium app icon for Global UI, a luminous task compass made of tidy project cards,
        checklist sparks, and a gentle robot pointer orbiting a central interface hub,
        crisp iconic app-icon polish, strong readable silhouette, no text, no logo,
        no watermark, no collage, square composition
    card:
      image_path: projects/images/global-ui-card.webp
      size: "512x768"
      status: pending
      prompt: >
        Professional portrait card illustration for Global UI, a calm operator arranging
        projects, honeydos, kaizen prompts, approvals, and completion tokens into an elegant
        shared workspace interface, diverse humans and robots collaborating around floating
        task surfaces, premium product key art, no readable text, no logo, no watermark,
        no collage, 2:3 portrait composition
    hero:
      image_path: projects/images/global-ui-hero.webp
      size: "1280x720"
      status: pending
      prompt: >
        High-end wide hero illustration for Global UI, a grand Kind Robots command space
        where global honeydo tasks flow through a central inbox while project-specific
        kaizen prompts glow beside individual project portals; approvals, roadmaps, and
        user-created TODOs connect as clear light paths without clutter, cinematic studio
        product art, no readable text, no logo, no watermark, no collage, 16:9 landscape
        composition

  - project: wishmaster
    icon:
      image_path: projects/images/wishmaster-icon.webp
      size: "256x256"
      status: pending
      prompt: >
        Premium app icon for Wishmaster, a luminous floating lantern shaped like a speech
        bubble with a subtle genie silhouette glowing inside, warm amber and gold light,
        crisp iconic app-icon polish, dark vignette backdrop, no text, no logo, no watermark,
        no collage, square composition
    card:
      image_path: projects/images/wishmaster-card.webp
      size: "512x768"
      status: pending
      prompt: >
        Professional portrait card illustration for Wishmaster, a diverse user and a glowing
        bot shake hands over a luminous contract that unfolds into project cards, composition
        tiles, and wish-fulfillment paths, warm magical atmosphere meets futuristic product
        design, premium studio illustration, no text, no logo, no watermark, no collage,
        2:3 portrait composition
    hero:
      image_path: projects/images/wishmaster-hero.webp
      size: "1280x720"
      status: pending
      prompt: >
        High-end wide hero illustration for Wishmaster, a grand workshop where wishes become
        projects — users speak desires to a patient bot who assembles customized Compositions
        of images, text, stories, and rewards into new Dreams; a diverse consortium of humans,
        robots, creatures, and companions each pursuing their own custom creation, premium
        cinematic product launch art, no readable text, no logo, no watermark, no collage,
        16:9 landscape composition

  - project: media-watchlist
    icon:
      image_path: projects/images/media-watchlist-icon.webp
      size: "256x256"
      status: pending
