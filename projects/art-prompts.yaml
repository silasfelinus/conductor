# art-prompts.yaml — Image catalog for Conductor project cards
#
# Each entry defines the DALL-E prompt to generate a card illustration for
# a project, and where the resulting image lives in the workspace.
#
# Workflow:
#   1. Use the prompt below in ChatGPT (DALL-E 3 or GPT-4o image gen).
#   2. Export the result as .webp at 512×512px minimum, 1:1 aspect ratio.
#   3. Save to projects/images/<slug>.webp (replace <slug> with the project field value).
#   4. Rebuild: python scripts/build_workspace.py
#      The workspace card will automatically switch from the placeholder to your image.
#
# Status values: pending | done
# image_path is relative to repo root.

images:
  - project: conductor
    status: pending
    image_path: projects/images/conductor.webp
    prompt: >
      flat minimal icon of an orchestral conductor robot directing a glowing
      network of nodes with circuit-board lines, teal and deep indigo palette,
      clean vector style, no text

  - project: kind-robots
    status: pending
