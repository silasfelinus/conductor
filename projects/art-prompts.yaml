# art-prompts.yaml — Image queue for Conductor project assets and Kind Robots missing-image requests
#
# Project assets use `images:` and are pruned automatically when matching files
# exist in this repo's projects/images/ folder.
#
# Site-wide missing-image reports use `requests:`. Kind Robots writes those
# requests here when an admin sees a missing image. Requests should be removed
# once the image has been generated and committed to the target repo.
#
# Project image variants:
#   icon  — square 1:1 (256×256 min). Used in nav, sidebar, card headers, favicons.
#   card  — portrait 2:3 (512×768 min). Shown on the workspace project card.
#   hero  — landscape 16:9 (1280×720 min). Shown as a banner/header in project view.
#
# Workflow:
#   1. Copy the prompt into ChatGPT (image generation) or call the OpenAI Images API (model: gpt-image-1).
#   2. Set the correct aspect ratio in the generation UI (1:1 / 2:3 / 16:9).
#   3. Export as .webp at the minimum size listed.
#   4. Save to the image_path listed below.
#   5. Run `python scripts/build_workspace.py` to refresh the workspace.
#
# Status values: pending

images: []
requests:
  - id: "kind-robots-overview-card-5c53bbd4"
    source: "kind-robots-missing-image"
    status: "pending"
    target_repo: "silasfelinus/kind_robots"
    image_path: "public/images/projects/overview-card.webp"
    source_url: "https://kind-robots.vercel.app/images/projects/overview-card.webp"
    page_url: "https://kind-robots.vercel.app/conductor"
    variant: "card"
    size: "512x768"
    label: "Overview"
    prompt: >
      polished portrait illustration for Overview, centered subject, rich Kind Robots visual style, no text, 2:3 portrait composition
  - id: "kind-robots-tasks-card-f167a119"
    source: "kind-robots-missing-image"
    status: "pending"
    target_repo: "silasfelinus/kind_robots"
    image_path: "public/images/projects/tasks-card.webp"
    source_url: "https://kind-robots.vercel.app/images/projects/tasks-card.webp"
    page_url: "https://kind-robots.vercel.app/conductor"
    variant: "card"
    size: "512x768"
    label: "Tasks"
    prompt: >
      polished portrait illustration for Tasks, centered subject, rich Kind Robots visual style, no text, 2:3 portrait composition
  - id: "conductor-conductor-missing-image-pipeline-test-hero-c2e8b995"
    source: "kind-robots-missing-image"
    status: "pending"
    target_repo: "silasfelinus/conductor"
    image_path: "projects/images/conductor-missing-image-pipeline-test-hero.webp"
    source_url: "https://raw.githubusercontent.com/silasfelinus/conductor/main/projects/images/conductor-missing-image-pipeline-test-hero.webp"
    page_url: "https://kind-robots.vercel.app/dev/missing-image-test"
    variant: "hero"
    size: "1280x720"
    label: "Conductor missing image pipeline test hero"
    prompt: >
      wide cinematic hero image for Conductor missing image pipeline test hero, expressive scene with clear atmosphere and personality, no text, 16:9 landscape composition
  - id: "kind-robots-workspace-image-db545c5b"
    source: "kind-robots-missing-image"
    status: "pending"
    target_repo: "silasfelinus/kind_robots"
    image_path: "public/images/dashboard-tabs/wonder/workspace.webp"
    source_url: "/images/dashboard-tabs/wonder/workspace.webp"
    page_url: "https://kind-robots.vercel.app/conductor"
    variant: "image"
    label: "Conductor Workspace"
    prompt: >
      polished web illustration for Conductor Workspace, clear subject, cohesive Kind Robots visual style, no text
  - id: "conductor-tasks-hero-1ea39026"
    source: "kind-robots-missing-image"
    status: "pending"
    target_repo: "silasfelinus/conductor"
    image_path: "projects/images/tasks-hero.webp"
