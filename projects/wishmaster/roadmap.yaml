project: wishmaster
kind: software

notes_from_silas: |
  Wishmaster is a smart meta-bot that takes natural language "wishes" from users
  and assembles them into structured projects. It sits at the intersection of
  Bot, Composition, and Dream. The user says what they want (website, image set,
  story, product, whatever); Wishmaster builds it.

  Composition has existed in the schema but was never implemented. Wishmaster is
  the first real use of it: a modular output template the user can customize
  (what images? what text? what variants? in what format?). A fulfilled wish
  becomes a new Dream of type PROJECT in the system.

  Ties into the karma economy: wishing, fulfilling wishes via the bounty system,
  and having wishes fulfilled by others all generate karma. The bounty system
  (being built in parallel) lets users post wishes other users can fill for mana
  and karma rewards.

  House style: Nuxt 4 / Vue 3 / TypeScript / Prisma / Pinia 3 / DaisyUI.
  Do NOT auto-publish, spend money, or fire external services without needs-human.

