# Conductor App — native mobile and desktop client
project: conductor-app
kind: software

notes_from_silas: |
  Build a polished native client for Conductor. The first pass should define the
  app shape, the API client, project dashboard, todos, approvals, art requests,
  and notification strategy before implementation starts.

milestones:
  - id: m1
    title: "App shell and API contract"
    weight: 25
    status: not-started
  - id: m2
    title: "Dashboard and project views"
    weight: 30
    status: not-started
  - id: m3
    title: "Todos, approvals, and art requests"
    weight: 25
    status: not-started
  - id: m4
    title: "Notifications"
    weight: 20
    status: not-started

tasks:
  - id: t-001
    milestone: m1
    title: "Draft app architecture and API contract"
    status: ready
    owner: null
    passes: 0
    stakes: reversible
    gate_human: true
    note: >
      Draft the Conductor App architecture, screen list, data flow, and API
      endpoints needed for projects, todos, agent status, approvals, and art
      requests. Keep implementation gated until Silas approves the app shape.

  - id: t-002
    milestone: m2
    title: "Scaffold first dashboard shell"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Create the first app shell and dashboard after the architecture is approved.

  - id: t-003
    milestone: m3
    title: "Design mobile todo and approval flows"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Specify create/edit todo, pitch voting, task approval, and art request flows
      for small screens.

  - id: t-004
    milestone: m4
    title: "Choose notification strategy"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Compare practical notification approaches for agent completions, blocked
      tasks, and approvals needing review.
