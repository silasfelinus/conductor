# Art Generator Connect — conductor-driven image generation
project: art-generator-connect
kind: software

notes_from_silas: |
  Wire Conductor Worker cycles into the existing kind_robots SD / ComfyUI art
  generation pipelines. Workers should be able to request image generation and
  commit or record the resulting asset without adding new rendering infrastructure.

milestones:
  - id: m1
    title: "Map existing art API contracts"
    weight: 25
    status: not-started

  - id: m2
    title: "Conductor request wrapper"
    weight: 30
    status: not-started

  - id: m3
    title: "Result persistence and handoff"
    weight: 25
    status: not-started

  - id: m4
    title: "Project asset generation loop"
    weight: 20
    status: not-started

tasks:
  - id: t-001
    milestone: m1
    title: "Document kind_robots art API request and response shape"
    status: ready
    owner: null
    passes: 0
    stakes: reversible
    gate_human: true
    note: >
      Read the existing kind_robots SD and ComfyUI art generation endpoints and
      document the request fields, auth requirements, response shape, polling
      behavior, and failure modes in docs/art-api.md for Silas to review.

  - id: t-002
    milestone: m2
    title: "Draft Conductor art request script design"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Design scripts/request_art.py as a small wrapper around the approved art API
      contract. Include prompt, model, dimensions, projectSlug, auth, polling, and
      output path behavior without invoking live generation.

  - id: t-003
    milestone: m3
    title: "Specify how generated URLs map back to projects"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on: t-001
    note: >
      Define whether generated outputs are committed to projects/images, stored as
      ArtImage records, or written as handoff notes. Keep binaries out of agent runs
      unless Silas explicitly approves that workflow.

  - id: t-004
    milestone: m4
    title: "Add a dry-run project image request flow"
    status: waiting
    owner: null
    passes: 0
    stakes: reversible
    depends_on:
      - t-002
      - t-003
    note: >
      Create a dry-run flow that converts missing project icon/card/hero assets
      into queued requests without calling the live art generator.

  - id: t-005
    milestone: m1
    title: "Scan ART-PROMPTS.md and produce a pending-requests status table"
    status: ready
    owner: null
    updated: "2026-06-30T00:00:00Z"
    passes: 0
    stakes: reversible
    note: >
      Runs parallel to t-001's human gate. Read ART-PROMPTS.md at the repo root and
      cross-reference against projects/images/. Produce docs/art-request-status.md
      with a table: project slug, asset type (icon/card/hero), prompt present (Y/N),
      image file present (Y/N), and status (pending/done/missing-prompt). This gives
      the Worker a clear picture of which art requests are queued vs. fulfilled without
      needing the live art API contract.
