notes_from_silas: |
  Wire conductor Worker cycles into the existing SD / ComfyUI pipelines in
  kind_robots. Workers POST to the art API; result URL is committed back to the
  project or stored as an ArtImage record. Auth via KR_API_TOKEN.
  No new rendering infrastructure — consume existing kind_robots endpoints.
  Treat the shared backend as read-only/external; if a backend change is needed,
  write a pitch instead of touching it directly.

