project: humboldt-impropriety-calendar
kind: content
notes_from_silas: >
  First custom-calendar project. Mature/spicy is a preset, not a separate product type.
  Historical scope: Club Risqué -> Reasons to Say Yes -> Humboldt Impropriety Society
  in Humboldt County, California. Private performance videos may inform research but must
  never be shared publicly, uploaded to storefronts, or used in previews without separate
  written consent. Public storefront assets must stay safe-ish-for-work. Credit model(s),
  artist(s), photographer(s), director(s), and historical contributors where approved.
  Default 12-month royalty model: 12/20 of net profit allocated to month contributors,
  one 1/20 share per month, split by signed month-level payout preset or custom split.
  No contributor outreach, public posting, vendor upload, payment setup, printing, or
  publication without explicit human approval.
