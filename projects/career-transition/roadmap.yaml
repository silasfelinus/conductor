    depends_on: t-003
    gate_human: false
    note: >
      Produce projects/career-transition/interview-prep.md.

      Sections:
        1. HOW TO FRAME THE BACKGROUND — talking points for "you don't have a CS degree"
           and "you've been a casino dealer for 11 years." Concrete, honest, confident.
        2. BEHAVIORAL QUESTIONS — 10 common ones (Tell me about a time you...) with
