notes_from_silas: "Help me land a better-paying tech job. I've been a hobbyist programmer since 1989 (started\n\
  with a TRS-80), worked with AI since 2001, and I'm actively building multiple full-stack\nprojects (kind_robots:\
  \ Nuxt/Vue/Prisma/TypeScript), running this agent orchestration system\n(conductor), and developing\
  \ a nonprofit.\n\nMy non-tech background is broad: 11 years casino dealer (~$70k current salary), adult\n\
  support worker for people with developmental disabilities, co-owner of a chai brewing\ncompany (brewer\
  \ + bookkeeper), bookkeeper for a carpet company, IT admin for a grade\nschool, street performer. Degrees\
  \ in dance, performing arts, and massage therapy.\n\nTarget roles (in rough preference order):\n  1.\
  \ AI engineer / AI wrangler / prompt engineer / AI product roles\n  2. Junior full-stack dev (Nuxt/Vue/TypeScript/Node\
  \ ecosystem strongly preferred)\n  3. Developer relations / developer advocate\n  4. Technical community\
  \ manager\n  5. No-code/low-code platform specialist\n\nHard constraints:\n  - Do NOT apply to anything,\
  \ post anything public, or send any communication on my behalf.\n    Every outward action is gated.\
  \ Drafts and plans only until I approve.\n  - Target base >= $70k; growth path toward $100k+ in 2-3\
  \ years is the real goal.\n  - Remote-first strongly preferred.\n  - I love what I do \u2014 this is\
  \ about getting paid better for skills I already have, not\n    pivoting away from building with AI.\n"
