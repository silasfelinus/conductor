  - id: t-003
    milestone: m3
    title: 'Build scripts/build_kaizen.py — per-project kaizen prompt + honey-do list'
    status: waiting
    owner: null
    updated: '2026-06-28T00:00:00Z'
    passes: 0
    stakes: reversible
    depends_on: t-002
    note: >
      Build scripts/build_kaizen.py. For each active project it emits:

      1. KAIZEN PROMPT — the single most impactful action Silas can take right
      now, one sentence framed as a direct instruction
      (e.g. "Approve the stack spec in humboldt-scoop-cms/t-001").
      Priority order: needs-human tasks first, then gate_human gates with
      approved_by_human: false, then passes==3 blocked tasks, then stale
      claimed tasks with no recent commit.

      2. HONEY-DO LIST — every other action only Silas can unblock, as a
      markdown checkbox list ordered by downstream impact. Each item names
      the task id and the exact decision or file to touch.
      Agent-workable items are excluded entirely.

      Output: KAIZEN.md at the repo root, regenerated each cycle alongside
      PR-TRIAGE.md. The approval-portal (when built) reads the same data
      to render interactive checkboxes on each project card.

