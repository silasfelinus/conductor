project: engagement
kind: software

notes_from_silas: |
  The engagement and referral economy for Kind Robots. Governs how karma and
  mana flow through community interaction: referrals, bounties, content creation,
  reactions, and social sharing.

  Core principles:
  - Interaction is always rewarded, never punished. Posting a bounty (asking for
    help) is a social good — when someone fills it using house resources, the
    POSTER gets mana back from the house. Both sides are celebrated.
  - Bounties live IN the Prompt model (isBounty flag) — no separate model.
    A bounty is just a public prompt request with a status and claim system.
  - Karma and mana are separate registers with separate transaction tables.
    Karma = social standing (non-purchasable, earned by being a good citizen).
    Mana = generation fuel (rechargeable, purchasable, the energy economy).
  - Referrals earn karma + mana upfront, PLUS an ongoing cut of future payouts
    from the referred user (like patronage). The referral tree is permanent.
  - Karma and mana reward rates are Silas-set parameters — agents propose
    values, Silas approves before anything goes live. Always needs-human for
    rate changes.

  Anti-abuse: rate limits on all reward triggers. Circular referral rings,
  bot farms, and reaction spam need detection before any economy goes live.
  Gate every rate-setting task with gate_human: true.

