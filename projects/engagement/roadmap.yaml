project: engagement
kind: software
notes_from_silas: "The engagement and referral economy for Kind Robots. Governs how karma and\nmana flow\
  \ through community interaction: referrals, bounties, content creation,\nreactions, and social sharing.\n\
  \nCore principles:\n- Interaction is always rewarded, never punished. Posting a bounty (asking for\n\
  \  help) is a social good \u2014 when someone fills it using house resources, the\n  POSTER gets mana\
  \ back from the house. Both sides are celebrated.\n- Bounties live IN the Prompt model (isBounty flag)\
  \ \u2014 no separate model.\n  A bounty is just a public prompt request with a status and claim system.\n\
  - Karma and mana are separate registers with separate transaction tables.\n  Karma = social standing\
  \ (non-purchasable, earned by being a good citizen).\n  Mana = generation fuel (rechargeable, purchasable,\
  \ the energy economy).\n- Referrals earn karma + mana upfront, PLUS an ongoing cut of future payouts\n\
  \  from the referred user (like patronage). The referral tree is permanent.\n- Karma and mana reward\
  \ rates are Silas-set parameters \u2014 agents propose\n  values, Silas approves before anything goes\
  \ live. Always needs-human for\n  rate changes.\n\nAnti-abuse: rate limits on all reward triggers. Circular\
  \ referral rings,\nbot farms, and reaction spam need detection before any economy goes live.\nGate every\
  \ rate-setting task with gate_human: true.\n"
