# Kind Robots — App(s)
# BOUNDARY.md approved 2026-06-30. Slug parity is now a standing rule.
# Progress % = done weight (+ half for in-progress) / total weight.

project: kind-robots
kind: software

notes_from_silas: |
  BOUNDARY.md approved (2026-06-30). Key boundary: the Kind Robots app(s) should
  develop their OWN system here, but CONSUME our existing database, backend, and
  core offerings rather than reimplementing or modifying them. Agents: treat the
  shared backend (kind-robots.vercel.app / the main repo) as read-only and external.
  Build app-owned logic in this folder. Do not propose changes to the shared
  backend here — if you think one is needed, write a pitch to pitches/ instead.
  Nuxt 4 / Vue 3 / TypeScript / Prisma / Pinia 3 / DaisyUI house style applies.

  Slug parity: Dream.slug is the universal key linking conductor projects to
  kind_robots Dreams. Do not add redundant FK fields — enforce slug matching
  between conductor project directory names and Dream.slug values. The sync script
  (conductor/t-008) handles conductor → Dream writes; this project handles the
  Dream → conductor notification flow (creating a Todo when a new PROJECT Dream
  is added so the Worker can scaffold the matching roadmap.yaml).

milestones:
  - id: m1
    title: "App scope + boundary defined (what's app-owned vs shared backend)"
    weight: 100
    status: done

  - id: m2
    title: "Workspace UI — project card images"
    weight: 10
    status: done

  - id: m3
    title: "Slug parity + project creation surfaces"
    weight: 40
    status: not-started

