  - id: t-003
    milestone: m3
    title: "Audit slug parity between conductor projects and kind_robots Dreams"
    status: ready
    owner: null
    updated: "2026-06-30T00:00:00Z"
    passes: 0
    stakes: reversible
    note: >
      Read all active conductor project slugs (from project-overrides.yaml) and
      compare against kind_robots Dreams of dreamType PROJECT (via read-only API
      call to https://kind-robots.vercel.app/api/dreams?dreamType=PROJECT).
      Write projects/kind-robots/SLUG-AUDIT.md listing: (a) conductor projects
      with no matching Dream, (b) PROJECT Dreams with no conductor project,
      (c) any slug mismatches. Do not create or modify Dreams — document gaps
      only. The sync script (conductor/t-008) will act on these findings.

  - id: t-004
    milestone: m3
    title: "Spec the three project-creation surfaces (conductor file, front-end, LLM)"
    status: ready
    owner: null
    updated: "2026-06-30T00:00:00Z"
    passes: 0
    stakes: reversible
    gate_human: true
    approved_by_human: false
    depends_on: t-003
    note: >
      Write projects/kind-robots/PROJECT-CREATION.md defining how a project is
      created from each of three surfaces:
      1. Conductor file format — a new roadmap.yaml in projects/<slug>/ triggers
         Dream creation via the sync script on the next conductor run.
      2. Kind Robots front-end — UI creates a PROJECT-type Dream with a chosen
         slug; this posts a Todo (category: AGENT) so the Worker scaffolds the
         matching roadmap.yaml in conductor.
      3. LLM — same as front-end: LLM creates a PROJECT Dream, Todo interrupt
         carries the slug to the Worker.
      In all cases: Dream.slug === conductor project directory name. Ends
      needs-human for Silas to approve before implementation begins.

  - id: t-005
    milestone: m3
    title: "Show task note text in conductor-page.vue task cards"
    status: ready
    owner: null
    updated: "2026-06-30T00:00:00Z"
    passes: 0
    stakes: reversible
    note: >
      conductor-page.vue task cards (in the project detail view) currently show id,
      milestone, gateHuman, owner, and passes but NOT the task note text. Add a
      collapsible or truncated note display below the task title row. The note field
      is already returned by /api/conductor/projects — no API change needed, just
      a template addition to the task card in conductor-page.vue in kind_robots.

  - id: t-006
    milestone: m3
    title: "Surface stakes, depends_on, and approved_by_human in task detail"
    status: ready
    owner: null
    updated: "2026-06-30T00:00:00Z"
    passes: 0
    stakes: reversible
    depends_on: t-005
    note: >
      conductor-page.vue task cards do not currently show stakes, depends_on, or
      approved_by_human. These are critical for Silas to understand what's blocking
      what. Add them to the task card metadata row (alongside owner/passes/gate).
      Requires extending the ConductorTask type in /api/conductor/projects.get.ts
      to include stakes (string), dependsOn (string | string[] | null), and
      approvedByHuman (boolean) — the raw YAML already has these fields, the
      parser just needs to extract them.

  - id: t-007
    milestone: m3
    title: "Show relative 'updated' timestamp on task cards in conductor-page.vue"
    status: ready
    owner: null
    updated: "2026-06-30T00:00:00Z"
    passes: 0
    stakes: reversible
    note: >
      Task cards currently show no time information, making it hard to spot stale
      claimed tasks or recently updated items. The `updated` field is already returned
      by /api/conductor/projects (part of ConductorTask). Add a relative timestamp
      display (e.g. "2h ago", "3 days ago") below the task title row using a simple
      computed helper — no new dependencies needed. Runs parallel to t-005 and t-006.
