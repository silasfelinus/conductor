# Pitches

Where proposal-kind agents (and any agent with an idea) drop pitches for Silas to vet.
One file per pitch: `pitches/<date>-<slug>.md`, using the pitch template in AGENTS.md.

Pitches surface in the daily digest under "Awaiting your vote." Silas sets each pitch's
`status:` to `approved` or `rejected`. Approved pitches become real tasks in the relevant
project's roadmap (or a new project). Pitches may target an existing project, a new one,
or AI_Networker itself.
