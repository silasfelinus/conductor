name: daily-digest

# Emails Silas a daily summary across all projects + pitches awaiting his vote.
# Run via this cron OR a Claude Managed Agent pointed at scripts/build_digest.py.

on:
  schedule:
    - cron: "0 15 * * *"   # 15:00 UTC ≈ 8am Pacific. Shifts with DST.
  workflow_dispatch:
    inputs:
      send_email:
        description: "Actually send the Brevo email. Leave false for a safe dry run."
        required: false
        default: false
        type: boolean

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      SHOULD_SEND_EMAIL: ${{ github.event_name == 'schedule' || inputs.send_email == true }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml openai
      - name: Build digest JSON
        run: |
          python scripts/build_digest.py --since "24 hours ago" > digest.json
          cat digest.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: Validate digest JSON
        run: python scripts/validate_digest.py digest.json
      - name: Build Brevo payload preview
        run: python scripts/build_digest_email.py digest.json digest-email.json
      - name: Upload digest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest-artifacts
          path: |
            digest.json
            digest-email.json
          if-no-files-found: warn
      - name: Check digest configuration
        run: python scripts/check_digest_config.py
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          DIGEST_TO: ${{ secrets.DIGEST_TO || vars.DIGEST_TO }}
          DIGEST_TO_NAME: ${{ secrets.DIGEST_TO_NAME || vars.DIGEST_TO_NAME }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM || vars.DIGEST_FROM }}
          DIGEST_FROM_NAME: ${{ secrets.DIGEST_FROM_NAME || vars.DIGEST_FROM_NAME }}
      - name: Email via Brevo
        if: ${{ env.SHOULD_SEND_EMAIL == 'true' }}
        run: python scripts/send_digest_brevo.py digest-email.json
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          DIGEST_TO: ${{ secrets.DIGEST_TO || vars.DIGEST_TO }}
          DIGEST_TO_NAME: ${{ secrets.DIGEST_TO_NAME || vars.DIGEST_TO_NAME }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM || vars.DIGEST_FROM }}
          DIGEST_FROM_NAME: ${{ secrets.DIGEST_FROM_NAME || vars.DIGEST_FROM_NAME }}
