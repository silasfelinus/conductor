name: daily-digest

# Emails Silas a daily summary across all projects + pitches awaiting his vote.
# Run via this cron OR a Claude Managed Agent pointed at scripts/build_digest.py.

on:
  schedule:
    - cron: "0 15 * * *"   # 15:00 UTC ≈ 8am Pacific. Shifts with DST.
  workflow_dispatch:
    inputs:
      send_email:
        description: "Actually send the Brevo email. Leave false for a safe dry run."
        required: false
        default: false
        type: boolean

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      SHOULD_SEND_EMAIL: ${{ github.event_name == 'schedule' || inputs.send_email == true }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Build digest JSON
        run: |
          python scripts/build_digest.py --since "24 hours ago" > digest.json
          cat digest.json
      - name: Validate digest JSON
        run: |
          python - <<'PY'
          import json
          import sys

          required_keys = [
              "date",
              "commits_since",
              "merges_since",
              "projects",
              "all_needs_attention",
              "pitches_awaiting_vote",
          ]
          list_keys = [
              "commits_since",
              "merges_since",
              "projects",
              "all_needs_attention",
              "pitches_awaiting_vote",
          ]
          required_project_keys = [
              "name",
              "kind",
              "progress_pct",
              "milestones",
              "needs_attention",
              "in_flight",
              "waiting_count",
              "ready_count",
          ]

          try:
              with open("digest.json", encoding="utf-8") as digest_file:
                  digest = json.load(digest_file)
          except json.JSONDecodeError as error:
              print(f"digest.json is not valid JSON: {error}", file=sys.stderr)
              sys.exit(1)

          missing = [key for key in required_keys if key not in digest]
          if missing:
              print("digest.json is missing required keys: " + ", ".join(missing), file=sys.stderr)
              sys.exit(1)

          wrong_list_types = [key for key in list_keys if not isinstance(digest[key], list)]
          if wrong_list_types:
              print("digest.json fields must be lists: " + ", ".join(wrong_list_types), file=sys.stderr)
              sys.exit(1)

          for index, project in enumerate(digest["projects"]):
              if not isinstance(project, dict):
                  print(f"digest.json projects[{index}] must be an object", file=sys.stderr)
                  sys.exit(1)

              missing_project_keys = [key for key in required_project_keys if key not in project]
              if missing_project_keys:
                  print(
                      f"digest.json projects[{index}] missing keys: " + ", ".join(missing_project_keys),
                      file=sys.stderr,
                  )
                  sys.exit(1)

              for key in ["milestones", "needs_attention", "in_flight"]:
                  if not isinstance(project[key], list):
                      print(f"digest.json projects[{index}].{key} must be a list", file=sys.stderr)
                      sys.exit(1)

          print("digest.json validated with " + str(len(digest["projects"]) + " projects")
          PY
      - name: Build Brevo payload preview
        run: |
          python - <<'PY'
          import html
          import json

          with open("digest.json", encoding="utf-8") as digest_file:
              digest = json.load(digest_file)

          def ul(items):
              safe_items = [html.escape(str(item)) for item in items]
              return "<ul>" + "".join(f"<li>{item}</li>" for item in safe_items) + "</ul>"

          project_html = ""
          for project in digest["projects"]:
              project_name = html.escape(str(project["name"]))
              project_kind = html.escape(str(project["kind"]))
              project_html += f"<h3>{project_name} <span style='color:#888'>({project_kind})</span> — {project['progress_pct']}%</h3>"
              project_html += ul([f"{milestone['title']} — {milestone['status']}" for milestone in project["milestones"]])
              if project["in_flight"]:
                  project_html += "<p><i>In flight:</i></p>" + ul(project["in_flight"])

          digest_date = html.escape(str(digest["date"]))
          html_content = f"""
          <h2>AI_Networker — Daily Digest ({digest_date})</h2>
          <h3>🗳️ Awaiting your vote (pitches)</h3>{ul(digest['pitches_awaiting_vote'] or ['(no pitches waiting)'])}
          <h3>Merged in last 24h</h3>{ul(digest['merges_since'] or ['(nothing merged)'])}
          <h3>Needs your attention</h3>{ul(digest['all_needs_attention'] or ['(all clear)'])}
          <hr>{project_html}
          """

          payload_preview = {
              "subject": f"AI_Networker Digest {digest['date']}",
              "htmlContent": html_content,
          }

          with open("digest-email.json", "w", encoding="utf-8") as payload_file:
              json.dump(payload_preview, payload_file, indent=2)

          print("Built digest-email.json payload preview without recipient, sender, or API key values.")
          PY
      - name: Upload digest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest-artifacts
          path: |
            digest.json
            digest-email.json
          if-no-files-found: warn
      - name: Check digest configuration
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          DIGEST_TO: ${{ secrets.DIGEST_TO || vars.DIGEST_TO }}
          DIGEST_TO_NAME: ${{ secrets.DIGEST_TO_NAME || vars.DIGEST_TO_NAME }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM || vars.DIGEST_FROM }}
          DIGEST_FROM_NAME: ${{ secrets.DIGEST_FROM_NAME || vars.DIGEST_FROM_NAME }}
        run: |
          python - <<'PY'
          import os
          import sys

          should_send = os.environ.get("SHOULD_SEND_EMAIL", "false").lower() == "true"
          required = ["BREVO_API_KEY", "DIGEST_TO", "DIGEST_FROM"]
          optional = ["DIGEST_TO_NAME", "DIGEST_FROM_NAME"]
          missing = [name for name in required if not os.environ.get(name)]
          configured_optional = [name for name in optional if os.environ.get(name)]

          if configured_optional:
              print("Optional digest configuration present: " + ", ".join(configured_optional))
          else:
              print("Optional digest configuration present: none")

          if missing:
              print("Missing required digest configuration: " + ", ".join(missing), file=sys.stderr)
              if should_send:
                  print("Add missing values as GitHub Actions repository secrets or variables before running daily-digest.", file=sys.stderr)
                  sys.exit(1)
              print("Email send disabled for this run; missing send configuration does not fail the dry run.")
          else:
              print("Required digest configuration present: " + ", ".join(required))

          if should_send:
              print("Email send enabled for this run.")
          else:
              print("Email send disabled for this run. Inspect daily-digest-artifacts before enabling send_email.")
          PY
      - name: Email via Brevo
        if: ${{ env.SHOULD_SEND_EMAIL == 'true' }}
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          DIGEST_TO: ${{ secrets.DIGEST_TO || vars.DIGEST_TO }}
          DIGEST_TO_NAME: ${{ secrets.DIGEST_TO_NAME || vars.DIGEST_TO_NAME }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM || vars.DIGEST_FROM }}
          DIGEST_FROM_NAME: ${{ secrets.DIGEST_FROM_NAME || vars.DIGEST_FROM_NAME }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          required = ["BREVO_API_KEY", "DIGEST_TO", "DIGEST_FROM"]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              print("Missing required digest configuration: " + ", ".join(missing), file=sys.stderr)
              print("Add these as GitHub Actions repository secrets before running daily-digest.", file=sys.stderr)
              sys.exit(1)

          with open("digest-email.json", encoding="utf-8") as payload_file:
              payload = json.load(payload_file)

          payload["sender"] = {
              "email": os.environ["DIGEST_FROM"],
              "name": os.environ.get("DIGEST_FROM_NAME") or "AI_Networker",
          }
          payload["to"] = [
              {
                  "email": os.environ["DIGEST_TO"],
                  "name": os.environ.get("DIGEST_TO_NAME") or "Silas",
              }
          ]

          request = urllib.request.Request(
              "https://api.brevo.com/v3/smtp/email",
              data=json.dumps(payload).encode("utf-8"),
              method="POST",
              headers={
                  "api-key": os.environ["BREVO_API_KEY"],
                  "accept": "application/json",
                  "Content-Type": "application/json",
              },
          )

          try:
              with urllib.request.urlopen(request) as response:
                  print(response.read().decode("utf-8"))
          except urllib.error.HTTPError as error:
              error_body = error.read().decode("utf-8", errors="replace")
              print(f"Brevo email request failed with HTTP {error.code}: {error_body}", file=sys.stderr)
              sys.exit(1)
          PY
