name: Worker (Hourly)

# Runs every hour at :30. Picks the highest-priority ready task, generates the
# work via OpenAI (gpt-4o), commits to a worker/* branch, opens a PR, and
# attempts to auto-merge it. On conflict, rebases and asks OpenAI to resolve
# before retrying. Only leaves the PR open if it cannot merge after retries.
#
# Requires secrets: OPENAI_API_KEY, GITHUB_TOKEN (auto-provided, but needs
# branch-protection bypass for push to main — add github-actions[bot] to the
# bypass list, or use a PAT stored as GH_PAT instead).
# Optional: KR_API_TOKEN (kind_robots todos)

on:
  schedule:
    - cron: "30 * * * *"   # :30 past every hour
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — no commits, no PRs, no merges"
        required: false
        default: "false"
        type: string

jobs:
  worker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use GH_PAT if set (needed if branch protection blocks github-actions[bot]).
          # Otherwise falls back to the default GITHUB_TOKEN.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run worker cycle
        run: |
          FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then FLAG="--dry-run"; fi
          python scripts/run_worker.py $FLAG
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          KR_API_TOKEN: ${{ secrets.KR_API_TOKEN }}
          GIT_USER_NAME: "worker-bot"
          GIT_USER_EMAIL: "worker-bot@users.noreply.github.com"
